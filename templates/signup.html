<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>

<h2>Create Account</h2>

<form action="/signup" method="POST">

    <input
        type="text"
        name="name"
        placeholder="Full Name"
        required
    ><br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    ><br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    ><br><br>

    <button type="submit">
        Sign Up
    </button>

</form>

<br>

<a href="/login">
Already have an account?
</a>

</body>
</html>
